<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAASOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box} :root{--bg:#090a0f;--panel:#12141c;--panel2:#181b25;--panel3:#202432;--text:#f5f7fb;--muted:#8f98aa;--line:#2b3040;--acid:#c8ff38;--cyan:#51d6ff;--pink:#ff4fb8;--orange:#ff9f1c;--shadow:0 20px 60px rgba(0,0,0,.42)}
html{scroll-behavior:smooth} body{margin:0;min-height:100vh;font-family:"Noto Sans JP",system-ui,sans-serif;background:radial-gradient(circle at 15% -8%,rgba(200,255,56,.18),transparent 28%),radial-gradient(circle at 92% 2%,rgba(255,79,184,.15),transparent 30%),linear-gradient(180deg,#090a0f 0%,#10131b 55%,#090a0f 100%);color:var(--text)}
button,textarea{font:inherit} button{border:0;cursor:pointer}.app{width:min(100%,460px);min-height:100vh;margin:0 auto;padding:14px 14px 110px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:8px 2px 14px}.brand{display:flex;align-items:center;gap:10px}.brand-mark{width:54px;height:44px;display:grid;place-items:center;filter:drop-shadow(0 3px 7px rgba(0,0,0,.45))}.brand-mark svg{width:54px;height:38px}.brand-copy strong{display:block;font-size:20px;line-height:1;letter-spacing:.05em}.brand-copy span{display:block;margin-top:4px;color:var(--muted);font-size:11px;font-weight:700}.round-icon{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;color:var(--text);background:rgba(255,255,255,.06);box-shadow:inset 0 0 0 1px var(--line)}.round-icon svg{width:21px;height:21px}
.composer-shell{position:relative;z-index:20;margin:0 -2px 16px}.composer{overflow:visible;border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025)),var(--panel);border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow)}.pull-zone{display:grid;gap:12px;padding:16px}.greeting{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}.greeting h1{margin:0;font-size:28px;line-height:1.08;font-weight:900}.greeting p{margin:6px 0 0;color:var(--muted);font-size:12px;font-weight:700}.status-chip{flex:0 0 auto;border-radius:999px;padding:8px 10px;color:#090a0f;background:var(--acid);font-size:11px;font-weight:900}.quick-input{width:100%;min-height:120px;resize:vertical;border:0;outline:0;border-radius:18px;background:#08090d;color:var(--text);padding:15px;line-height:1.65;box-shadow:inset 0 0 0 1px var(--line)}.quick-input:focus{box-shadow:inset 0 0 0 2px rgba(200,255,56,.7),0 0 0 4px rgba(200,255,56,.08)}.quick-input::placeholder{color:#687082}
.mode-picker{position:relative}.mode-controls{display:grid;grid-template-columns:1fr 50px;gap:8px}.mode-current{width:100%;min-height:50px;border-radius:16px;background:var(--panel2);color:var(--text);box-shadow:inset 0 0 0 1px var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 10px 0 14px}.random-mode-btn{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(255,79,184,.2),rgba(81,216,255,.18));color:var(--text);box-shadow:inset 0 0 0 1px var(--line)}.random-mode-btn svg{width:22px;height:22px}.random-mode-btn:active{transform:scale(.96)}.mode-current-text{display:grid;gap:2px;text-align:left}.mode-current-text small{color:var(--muted);font-size:10px;font-weight:900}.mode-current-text strong{font-size:14px}.mode-arrow{width:34px;height:34px;border-radius:12px;background:#090a0f;display:grid;place-items:center;color:var(--acid);flex:0 0 auto}.mode-arrow svg{width:18px;height:18px;transition:transform .2s ease}.mode-picker.open .mode-arrow svg{transform:rotate(180deg)}.mode-list{display:none;max-height:min(430px,52dvh);overflow-y:auto;margin-top:8px;border-radius:16px;background:#090a0f;border:1px solid var(--line);box-shadow:0 18px 40px rgba(0,0,0,.34)}.mode-picker.open .mode-list{display:grid}.mode-option{min-height:58px;display:grid;gap:3px;padding:10px 14px;background:#090a0f;color:var(--text);text-align:left;border-bottom:1px solid var(--line)}.mode-option:last-child{border-bottom:0}.mode-option strong{font-size:13px}.mode-option span{color:var(--muted);font-size:11px}.mode-option.active{background:linear-gradient(90deg,rgba(200,255,56,.16),rgba(81,216,255,.08));color:var(--acid)}
.composer-actions{display:grid}.convert-btn,.post-btn{min-height:50px;border-radius:16px;background:linear-gradient(135deg,var(--acid),var(--cyan));color:#090a0f;font-weight:900;box-shadow:0 12px 28px rgba(200,255,56,.14)}.drawer{max-height:0;overflow:hidden;transition:max-height .28s ease}.composer.has-result .drawer{max-height:560px}.drawer-inner{display:grid;gap:12px;padding:0 16px 16px}.result-box{min-height:128px;border-radius:18px;background:#090a0f;border:1px solid var(--line);padding:14px}.result-label{display:flex;align-items:center;gap:8px;margin-bottom:8px;color:var(--acid);font-size:12px;font-weight:900}.result-text{margin:0;color:var(--text);line-height:1.72;font-size:14px;white-space:pre-wrap}
.section-title{display:flex;align-items:end;justify-content:space-between;margin:18px 2px 10px}.section-title h2{margin:0;font-size:18px;font-weight:900}.section-title button{background:transparent;color:var(--acid);font-weight:900}.feed{display:grid;gap:10px}.post{border-radius:20px;background:rgba(18,20,28,.92);border:1px solid rgba(255,255,255,.08);box-shadow:0 14px 34px rgba(0,0,0,.22);padding:14px}.post-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.profile{display:flex;align-items:center;gap:9px}.avatar{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--pink),var(--orange));color:#090a0f;font-weight:900}.profile strong{display:block;font-size:13px}.profile span{display:block;margin-top:2px;color:var(--muted);font-size:11px}.tag{border-radius:999px;padding:6px 10px;background:rgba(200,255,56,.1);color:var(--acid);border:1px solid rgba(200,255,56,.25);font-size:10px;font-weight:900;white-space:nowrap}.post p{margin:0;color:#e8ecf4;line-height:1.72;font-size:14px}.source-accordion{margin-top:10px;border-radius:12px;overflow:hidden;background:rgba(255,255,255,.04)}.source-toggle{width:100%;min-height:42px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:transparent;color:var(--muted);font-size:12px;font-weight:900;text-align:left}.source-toggle svg{width:16px;height:16px;flex:0 0 auto;transition:transform .2s ease}.source-accordion.open .source-toggle{color:var(--acid)}.source-accordion.open .source-toggle svg{transform:rotate(180deg)}.source-note{display:none;margin:0;padding:0 12px 11px;color:var(--muted);font-size:12px;line-height:1.5}.source-accordion.open .source-note{display:block}.post-actions{display:flex;gap:8px;margin-top:12px}.action{min-width:62px;height:36px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;gap:5px;background:var(--panel3);color:var(--muted);font-size:12px;font-weight:900}.action svg{width:16px;height:16px}.action.like,.action.cheer,.action.comment{color:#f5f7fb}
.bottom-nav{position:fixed;left:50%;bottom:14px;z-index:12;transform:translateX(-50%);width:min(calc(100% - 28px),432px);min-height:70px;display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:8px;border-radius:22px;background:rgba(18,20,28,.9);border:1px solid rgba(255,255,255,.1);box-shadow:0 18px 46px rgba(0,0,0,.42);backdrop-filter:blur(16px)}.nav-btn{border-radius:16px;background:transparent;color:var(--muted);display:grid;place-items:center;gap:3px;padding:7px 2px;font-size:10px;font-weight:900}.nav-btn svg{width:21px;height:21px}.nav-btn.active{background:rgba(179,18,45,.18);color:#f5f7fb}.post-create-btn{align-self:center;justify-self:center;width:64px;height:58px;margin-top:-28px;border-radius:20px;display:grid;place-items:center;background:linear-gradient(145deg,#123c2d,#0a1712);border:1px solid rgba(179,18,45,.8);box-shadow:0 10px 30px rgba(179,18,45,.28),0 0 0 5px #10121a;transition:transform .18s ease}.post-create-btn:active{transform:scale(.92)}.post-create-btn svg{width:56px;height:36px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}.toast{position:fixed;left:50%;bottom:100px;z-index:40;transform:translateX(-50%) translateY(14px);width:min(calc(100% - 38px),380px);border-radius:14px;padding:12px 14px;background:#f5f7fb;color:#090a0f;font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.avatar img{width:100%;height:100%;object-fit:contain}.profile-modal{position:fixed;inset:0;z-index:30;display:none;place-items:center;padding:18px;background:rgba(3,4,8,.76);backdrop-filter:blur(12px)}.profile-modal.open{display:grid}.profile-panel{width:min(100%,460px);max-height:calc(100dvh - 36px);overflow:auto;border-radius:24px;padding:20px;background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow)}.profile-panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.profile-panel h2{margin:0;font-size:21px}.profile-close{width:38px;height:38px;border-radius:12px;background:var(--panel3);color:var(--text);font-size:22px}.profile-note{margin:7px 0 18px;color:var(--muted);font-size:12px;line-height:1.6}.profile-label{display:block;margin-bottom:7px;color:var(--muted);font-size:11px;font-weight:900}.profile-name-input{width:100%;height:48px;border:1px solid var(--line);outline:0;border-radius:14px;padding:0 14px;background:#090a0f;color:var(--text);font:inherit}.avatar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}.avatar-option{aspect-ratio:1;border-radius:18px;padding:8px;background:var(--panel2);border:2px solid transparent}.avatar-option img{width:100%;height:100%;object-fit:contain}.avatar-option.selected{border-color:var(--acid);background:rgba(200,255,56,.1);box-shadow:0 0 0 3px rgba(200,255,56,.08)}.profile-save{width:100%;height:50px;margin-top:18px;border-radius:16px;background:linear-gradient(135deg,var(--acid),var(--cyan));color:#090a0f;font-weight:900}
@media (min-width:860px){.app{width:min(100%,1100px);display:grid;grid-template-columns:420px 1fr;gap:28px;align-items:start;padding:26px 28px 108px}.topbar,.composer-shell{grid-column:1}.feed-area{grid-column:2;grid-row:1/span 3;padding-top:4px}.bottom-nav{width:min(calc(100% - 56px),740px)}}
</style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div class="brand"><div class="brand-mark" aria-hidden="true"><svg viewBox="0 0 512 260" fill="none"><path fill="#f2efe8" stroke="#08090d" stroke-width="8" d="M256 108C190 60 103 64 18 22c12 88 57 161 150 186 35-6 65-25 88-54Z"/><path fill="#08090d" stroke="#f2efe8" stroke-width="8" d="M256 108c66-48 153-44 238-86-12 88-57 161-150 186-35-6-65-25-88-54Z"/><path fill="#08090d" d="M70 101c51-29 99-23 141 15-34 42-77 51-128 27Z"/><path fill="#f2efe8" d="M301 116c42-38 90-44 141-15l-13 42c-51 24-94 15-128-27Z"/><path fill="#08090d" d="m53 56 67 29-42 8Zm62 94c29 7 55 3 78-13-11 29-34 47-68 53Z"/><path fill="#f2efe8" d="m459 56-67 29 42 8Zm-62 94c-29 7-55 3-78-13 11 29 34 47 68 53Z"/><path fill="#123c2d" d="m245 108 11-22 11 22-11 49Z"/></svg></div><div class="brand-copy"><strong>CAASOL</strong><span>嫌な出来事をネタに変える掲示板</span></div></div>
    <button class="round-icon" type="button" aria-label="通知"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
  </header>
  <section class="composer-shell" aria-label="書き込み作成"><div class="composer" id="composer"><div class="pull-zone"><div class="greeting"><div><h1>今日の事件</h1><p>汚い言葉でもOK。AIが笑える書き込みに変えます。</p></div><span class="status-chip">LIVE</span></div><textarea class="quick-input" id="inputText" placeholder="例：電車で横入りされて朝から全部終わった。ここに本音をそのまま書く。"></textarea><div class="mode-picker" id="modePicker"><div class="mode-controls"><button class="mode-current" id="modeCurrent" type="button" aria-expanded="false" aria-controls="modeList"><span class="mode-current-text"><small>変換モード</small><strong id="modeCurrentLabel">お嬢様口調</strong></span><span class="mode-arrow" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span></button><button class="random-mode-btn" id="randomModeBtn" type="button" aria-label="変換モードをランダムに選ぶ" title="おまかせ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg></button></div><div class="mode-list" id="modeList" aria-label="変換モード一覧"><button class="mode-option active" type="button" data-mode="lady"><strong>お嬢様口調</strong><span>理不尽を優雅な一撃に変換</span></button><button class="mode-option" type="button" data-mode="poetic"><strong>詩的モード</strong><span>嫌な出来事を余韻のある言葉に変換</span></button><button class="mode-option" type="button" data-mode="comedy"><strong>コメディモード</strong><span>身の回りの不満を笑える話に変換</span></button><button class="mode-option" type="button" data-mode="chuunibyou"><strong>中二病モード</strong><span>日常を封印と宿命の物語に変換</span></button><button class="mode-option" type="button" data-mode="business"><strong>ビジネスメールモード</strong><span>怒りを丁寧すぎる業務連絡に変換</span></button><button class="mode-option" type="button" data-mode="samurai"><strong>侍モード</strong><span>理不尽を武士の一幕として語る</span></button><button class="mode-option" type="button" data-mode="news"><strong>ニュースキャスターモード</strong><span>小さな事件を冷静な速報に変換</span></button><button class="mode-option" type="button" data-mode="philosopher"><strong>哲学者モード</strong><span>出来事を無駄に深い問いへ変換</span></button><button class="mode-option" type="button" data-mode="demonlord"><strong>魔王モード</strong><span>不満を世界征服級の宣言に変換</span></button><button class="mode-option" type="button" data-mode="classical"><strong>古文モード</strong><span>現代の愚痴をいとをかしに変換</span></button></div></div><div class="composer-actions"><button class="convert-btn" id="convertBtn" type="button">AIでネタ化</button></div></div><div class="drawer"><div class="drawer-inner"><div class="result-box"><div class="result-label"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h8l-1 8 11-13h-8l1-7Z"/></svg>変換結果</div><p class="result-text" id="resultText">本音を書くと、ここに掲示板用のネタ化テキストが出ます。</p></div><button class="post-btn" id="postBtn" type="button">タイムラインに投げる</button></div></div></div></section>
  <section class="feed-area" aria-label="タイムライン"><div class="section-title"><h2>タイムライン</h2><button type="button" id="latestBtn">新着</button></div><div class="feed" id="feed"></div></section>
</main>
<div class="profile-modal" id="profileModal" role="dialog" aria-modal="true" aria-labelledby="profileTitle"><div class="profile-panel"><div class="profile-panel-head"><h2 id="profileTitle">プロフィール設定</h2><button class="profile-close" id="profileClose" type="button" aria-label="閉じる">×</button></div><p class="profile-note">名前とアイコンは、これから投稿する内容に表示されます。</p><label class="profile-label" for="profileName">名前（20文字まで）</label><input class="profile-name-input" id="profileName" maxlength="20" placeholder="名前を入力" autocomplete="nickname"><div class="avatar-grid" id="avatarGrid"><button class="avatar-option selected" type="button" data-avatar="longnose" aria-label="鼻の長い四角い子"><img src="assets/avatars/longnose.png" alt=""></button><button class="avatar-option" type="button" data-avatar="roundears" aria-label="耳のある丸い子"><img src="assets/avatars/roundears.png" alt=""></button><button class="avatar-option" type="button" data-avatar="firebox" aria-label="火が付いた箱の子"><img src="assets/avatars/firebox.png" alt=""></button><button class="avatar-option" type="button" data-avatar="oneeye" aria-label="大きな一つ目の子"><img src="assets/avatars/oneeye.png" alt=""></button><button class="avatar-option" type="button" data-avatar="boxhead" aria-label="箱をかぶった子"><img src="assets/avatars/boxhead.png" alt=""></button><button class="avatar-option" type="button" data-avatar="snail" aria-label="巻き貝っぽい子"><img src="assets/avatars/snail.png" alt=""></button></div><button class="profile-save" id="profileSave" type="button">このプロフィールにする</button></div></div>
<nav class="bottom-nav" aria-label="メインメニュー"><button class="nav-btn active" type="button">ホーム</button><button class="nav-btn" type="button">掲示板</button><button class="post-create-btn" id="postCreateBtn" type="button" aria-label="投稿を書く"><svg viewBox="0 0 512 260" fill="none" aria-hidden="true"><path fill="#f2efe8" stroke="#08090d" stroke-width="8" d="M256 108C190 60 103 64 18 22c12 88 57 161 150 186 35-6 65-25 88-54Z"/><path fill="#08090d" stroke="#f2efe8" stroke-width="8" d="M256 108c66-48 153-44 238-86-12 88-57 161-150 186-35-6-65-25-88-54Z"/><path fill="#08090d" d="M70 101c51-29 99-23 141 15-34 42-77 51-128 27Z"/><path fill="#f2efe8" d="M301 116c42-38 90-44 141-15l-13 42c-51 24-94 15-128-27Z"/><path fill="#08090d" d="m53 56 67 29-42 8Zm62 94c29 7 55 3 78-13-11 29-34 47-68 53Z"/><path fill="#f2efe8" d="m459 56-67 29 42 8Zm-62 94c-29 7-55 3-78-13 11 29 34 47 68 53Z"/><path fill="#123c2d" d="m245 108 11-22 11 22-11 49Z"/></svg></button><button class="nav-btn" type="button">ランキング</button><button class="nav-btn" id="settingsBtn" type="button">設定</button></nav><div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
const composer=document.getElementById('composer'),modePicker=document.getElementById('modePicker'),modeCurrent=document.getElementById('modeCurrent'),modeCurrentLabel=document.getElementById('modeCurrentLabel'),randomModeBtn=document.getElementById('randomModeBtn'),inputText=document.getElementById('inputText'),resultText=document.getElementById('resultText'),convertBtn=document.getElementById('convertBtn'),postBtn=document.getElementById('postBtn'),postCreateBtn=document.getElementById('postCreateBtn'),latestBtn=document.getElementById('latestBtn'),feed=document.getElementById('feed'),toast=document.getElementById('toast'),settingsBtn=document.getElementById('settingsBtn'),profileModal=document.getElementById('profileModal'),profileClose=document.getElementById('profileClose'),profileName=document.getElementById('profileName'),profileSave=document.getElementById('profileSave');let mode='lady',converted='';
const modePrompts={lady:'次の愚痴や身の回りの出来事を、お嬢様口調の日本語に言いかえてください。汚い言葉や攻撃的な表現は、笑えるけれど人を直接傷つけない表現に変換してください。SNS掲示板の書き込みとして自然で、少し皮肉が効いた文章にしてください。返答は言いかえ後の文章だけにしてください。',poetic:'次の愚痴や身の回りの出来事を、詩的モードの日本語に言いかえてください。嫌な出来事を余韻のある短い文章にしつつ、読んだ人が少し笑える比喩を入れてください。人を直接傷つける表現は避けてください。返答は言いかえ後の文章だけにしてください。',comedy:'次の愚痴や身の回りの出来事を、コメディモードの日本語に言いかえてください。怒りや不満を、読んだ人が笑える掲示板の書き込みに変換してください。人を直接傷つける表現は避け、テンポよく短めにしてください。返答は言いかえ後の文章だけにしてください。',chuunibyou:'次の出来事を中二病モードの日本語に言いかえてください。日常の不満を、封印された力、宿命、闇、覚醒などを用いた大げさで格好つけた物語にしてください。読んだ人が笑える短い掲示板投稿にし、人を直接傷つける表現は避けてください。返答は変換後の文章だけにしてください。',business:'次の不満をビジネスメールモードの日本語に言いかえてください。怒りを極端に丁寧で冷静な業務連絡に変換し、「お世話になっております」などの表現を自然に使ってください。皮肉は含めても、人を直接攻撃しない短い文章にしてください。返答は変換後の文章だけにしてください。',samurai:'次の出来事を侍モードの日本語に言いかえてください。現代の理不尽を武士の戦いや不覚として語り、「拙者」「ござる」などを自然に使ってください。大げさで笑える短い掲示板投稿にし、人を直接傷つけないでください。返答は変換後の文章だけにしてください。',news:'次の出来事をニュースキャスターモードの日本語に言いかえてください。小さな日常の事件を、冷静で真面目なニュース速報や現場中継のように大げさに報道してください。簡潔で笑える文章にし、返答は変換後の文章だけにしてください。',philosopher:'次の出来事を哲学者モードの日本語に言いかえてください。日常の不満から、存在、自由、幸福、時間などについて無駄に深い問いを導いてください。難しそうなのに少し笑える短い文章にし、返答は変換後の文章だけにしてください。',demonlord:'次の出来事を魔王モードの日本語に言いかえてください。小さな不満を、世界征服を企む魔王の尊大な宣言や勇者への挑戦のように表現してください。大げさで笑える短い文章にし、人を直接傷つけないでください。返答は変換後の文章だけにしてください。',classical:'次の出来事を古文モードの日本語に言いかえてください。現代の愚痴を古文調にし、「いと」「けり」「なり」「をかし」などを読みやすく自然に使ってください。意味が伝わり、少し笑える短い文章にしてください。返答は変換後の文章だけにしてください。'};
const modeLabels={lady:'お嬢様口調',poetic:'詩的モード',comedy:'コメディモード',chuunibyou:'中二病モード',business:'ビジネスメールモード',samurai:'侍モード',news:'ニュースキャスターモード',philosopher:'哲学者モード',demonlord:'魔王モード',classical:'古文モード'};
const storedPostsKey='caasol-posts';
const profileKey='caasol-profile',avatarNames=['longnose','roundears','firebox','oneeye','boxhead','snail'];let profile=readProfile(),selectedAvatar=profile.avatar;
function readStoredPosts(){try{const posts=JSON.parse(localStorage.getItem(storedPostsKey)||'[]');return Array.isArray(posts)?posts:[]}catch(error){return[]}}
function readProfile(){try{const saved=JSON.parse(localStorage.getItem(profileKey)||'{}');return{name:typeof saved.name==='string'&&saved.name.trim()?saved.name.trim().slice(0,20):'匿名',avatar:avatarNames.includes(saved.avatar)?saved.avatar:'longnose'}}catch(error){return{name:'匿名',avatar:'longnose'}}}
function avatarUrl(avatar){return`assets/avatars/${avatarNames.includes(avatar)?avatar:'longnose'}.png`}
function createPostArticle(post){const article=document.createElement('article'),postedAt=new Date(post.created_at||post.createdAt),username=(post.username||'匿名').trim(),avatar=avatarNames.includes(post.avatar)?post.avatar:'longnose';article.className='post';article.dataset.remotePost='true';article.innerHTML=`<div class="post-head"><div class="profile"><div class="avatar"><img src="${avatarUrl(avatar)}" alt=""></div><div><strong>${escapeHtml(username)}</strong><span>${Number.isNaN(postedAt.getTime())?'たった今':postedAt.toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span></div></div><span class="tag">${escapeHtml(modeLabels[post.mode]||post.modeLabel||'投稿')}</span></div><p>${escapeHtml(post.text)}</p><div class="source-accordion"><button class="source-toggle" type="button" aria-expanded="false"><span>元ネタを見る</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button><div class="source-note">元ネタ：${escapeHtml(post.source||'非公開')}</div></div><div class="post-actions"><button class="action like" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v12"/><path d="M15 5.9 14 10h5.8a2 2 0 0 1 2 2.2l-.9 7a2 2 0 0 1-2 1.8H7V10l4-8a3.1 3.1 0 0 1 4 3.9Z"/><path d="M3 10h4v12H3Z"/></svg> 0</button><button class="action cheer" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c4 0 7-3 7-7 0-3-2-5-4-7 0 2-1 3-2 4 0-4-2-7-5-10 0 4-3 6-3 10 0 5 3 10 7 10Z"/><path d="M9 18c0-2 1-3 3-5 0 2 2 3 2 5a2.5 2.5 0 0 1-5 0Z"/></svg> 0</button><button class="action comment" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4Z"/></svg> 0</button></div>`;const sourceAccordion=article.querySelector('.source-accordion'),sourceToggle=article.querySelector('.source-toggle');sourceToggle.addEventListener('click',()=>{const open=sourceAccordion.classList.toggle('open');sourceToggle.setAttribute('aria-expanded',String(open));sourceToggle.querySelector('span').textContent=open?'元ネタを閉じる':'元ネタを見る'});return article}
function clearRemotePosts(){feed.querySelectorAll('[data-remote-post="true"]').forEach(article=>article.remove())}
async function readApiResponse(response){const contentType=response.headers.get('content-type')||'';if(!contentType.includes('application/json'))throw new Error('投稿APIがまだデプロイされていません。');return response.json()}
async function loadPosts(){try{const response=await fetch('/api/posts',{cache:'no-store'}),data=await readApiResponse(response);if(!response.ok)throw new Error((data.error&&data.error.message)||'投稿を取得できませんでした。');clearRemotePosts();(data.posts||[]).slice().reverse().forEach(post=>feed.prepend(createPostArticle(post)))}catch(error){showToast(error.message||'タイムラインを読み込めませんでした。')}}
async function migrateStoredPosts(){const storedPosts=readStoredPosts();if(!storedPosts.length)return;for(const post of storedPosts.slice().reverse()){const response=await fetch('/api/posts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:post.text,source:post.source||'非公開',mode:post.mode,username:post.username||'匿名',avatar:post.avatar||'longnose'})});if(!response.ok)return}localStorage.removeItem(storedPostsKey)}
function showToast(message){toast.textContent=message;toast.classList.add('show');clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.classList.remove('show'),2200)}
function openProfile(){profileName.value=profile.name==='匿名'?'':profile.name;selectedAvatar=profile.avatar;document.querySelectorAll('.avatar-option').forEach(button=>button.classList.toggle('selected',button.dataset.avatar===selectedAvatar));profileModal.classList.add('open');profileName.focus()}
function closeProfile(){profileModal.classList.remove('open')}
settingsBtn.addEventListener('click',openProfile);profileClose.addEventListener('click',closeProfile);profileModal.addEventListener('click',event=>{if(event.target===profileModal)closeProfile()});document.addEventListener('keydown',event=>{if(event.key==='Escape'&&profileModal.classList.contains('open'))closeProfile()});document.querySelectorAll('.avatar-option').forEach(button=>button.addEventListener('click',()=>{selectedAvatar=button.dataset.avatar;document.querySelectorAll('.avatar-option').forEach(item=>item.classList.toggle('selected',item===button))}));profileSave.addEventListener('click',()=>{const name=profileName.value.trim();if(!name){showToast('名前を入力してください。');profileName.focus();return}profile={name:name.slice(0,20),avatar:selectedAvatar};localStorage.setItem(profileKey,JSON.stringify(profile));document.querySelectorAll('.nav-btn').forEach((button,index)=>button.classList.toggle('active',index===0));closeProfile();showToast('プロフィールを保存しました。')});
postCreateBtn.addEventListener('click',()=>{document.querySelectorAll('.nav-btn').forEach((button,index)=>button.classList.toggle('active',index===0));composer.scrollIntoView({behavior:'smooth',block:'start'});setTimeout(()=>inputText.focus({preventScroll:true}),420)});
function selectMode(nextMode){mode=nextMode;modeCurrentLabel.textContent=modeLabels[mode];document.querySelectorAll('.mode-option').forEach(item=>item.classList.toggle('active',item.dataset.mode===mode));modePicker.classList.remove('open');modeCurrent.setAttribute('aria-expanded','false')}
modeCurrent.addEventListener('click',()=>{const isOpen=modePicker.classList.toggle('open');modeCurrent.setAttribute('aria-expanded',String(isOpen))});document.querySelectorAll('.mode-option').forEach(button=>button.addEventListener('click',()=>selectMode(button.dataset.mode)));randomModeBtn.addEventListener('click',()=>{const modes=Object.keys(modeLabels),randomMode=modes[Math.floor(Math.random()*modes.length)];selectMode(randomMode);showToast(`${modeLabels[randomMode]}を選びました。`)});document.addEventListener('click',event=>{if(!modePicker.contains(event.target)){modePicker.classList.remove('open');modeCurrent.setAttribute('aria-expanded','false')}});
convertBtn.addEventListener('click',async()=>{const text=inputText.value.trim();if(!text){showToast('まずは今日の事件を書いてください。');inputText.focus();return}composer.classList.add('has-result');convertBtn.disabled=true;convertBtn.textContent='変換中';resultText.textContent='AIがネタ化しています...';try{const response=await fetch('/api/convert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'system',content:modePrompts[mode]},{role:'user',content:text}]})});const data=await response.json();if(!response.ok)throw new Error((data.error&&data.error.message)||'変換できませんでした。');converted=(data.choices||[]).map(choice=>choice.message&&choice.message.content||'').join('').trim();resultText.textContent=converted||'変換結果が空でした。もう一度試してください。'}catch(error){converted=localRewrite(text);resultText.textContent=converted;showToast('通信できないので、仮のネタ化を表示しました。')}finally{convertBtn.disabled=false;convertBtn.textContent='AIでネタ化'}});
postBtn.addEventListener('click',async()=>{const text=(converted||resultText.textContent||'').trim(),source=inputText.value.trim();if(!text||text.includes('本音を書くと')){showToast('先にAIでネタ化してください。');return}postBtn.disabled=true;postBtn.textContent='投稿中';try{const response=await fetch('/api/posts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,source:source||'非公開',mode,username:profile.name,avatar:profile.avatar})}),data=await readApiResponse(response);if(!response.ok)throw new Error((data.error&&data.error.message)||'投稿できませんでした。');feed.prepend(createPostArticle(data.post));inputText.value='';converted='';resultText.textContent='本音を書くと、ここに掲示板用のネタ化テキストが出ます。';composer.classList.remove('has-result');inputText.focus();showToast('タイムラインに投げました。')}catch(error){showToast(error.message||'投稿できませんでした。')}finally{postBtn.disabled=false;postBtn.textContent='タイムラインに投げる'}});
latestBtn.addEventListener('click',async()=>{latestBtn.disabled=true;latestBtn.textContent='更新中';await loadPosts();latestBtn.disabled=false;latestBtn.textContent='新着'});
document.querySelectorAll('.nav-btn').forEach(button=>{button.addEventListener('click',()=>{document.querySelectorAll('.nav-btn').forEach(item=>item.classList.remove('active'));button.classList.add('active')})});
function localRewrite(text){const cleaned=text.replace(/\s+/g,' ').trim();if(mode==='comedy')return`本日の小事件：「${cleaned}」。心の中でサイレンが鳴りましたが、現場からは以上です。`;if(mode==='poetic')return`${cleaned}。小さな理不尽が落ちてきて、今日の空に変な星座がひとつ増えた。`;if(mode==='chuunibyou')return`封印されし日常に「${cleaned}」が降臨した。どうやら我が右手を解放する時が来たようだ。`;if(mode==='business')return`お世話になっております。「${cleaned}」の件につきまして、私の平常心が対応困難となりましたのでご報告いたします。`;if(mode==='samurai')return`「${cleaned}」とは不覚。拙者の日常、ここにて一太刀浴び申した。`;if(mode==='news')return`速報です。「${cleaned}」との情報が入りました。現場では心の平穏が一時失われています。`;if(mode==='philosopher')return`「${cleaned}」。果たして理不尽とは出来事なのか、それとも我々の心が生み出す影なのか。`;if(mode==='demonlord')return`「${cleaned}」だと？ よかろう。この屈辱、世界征服の新たな動機として刻んでおこう。`;if(mode==='classical')return`「${cleaned}」とは、いとあはれなり。心乱れけるも、またをかし。`;return`${cleaned}。わたくしの優雅な一日に、なかなかパンチの効いた余興が追加されましたわ。`}
function escapeHtml(value){return value.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
(async()=>{await migrateStoredPosts();await loadPosts()})();
</script>
</body>
</html>
