<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAASOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box} :root{--bg:#090a0f;--panel:#12141c;--panel2:#181b25;--panel3:#202432;--text:#f5f7fb;--muted:#8f98aa;--line:#2b3040;--acid:#c8ff38;--cyan:#51d6ff;--pink:#ff4fb8;--orange:#ff9f1c;--shadow:0 20px 60px rgba(0,0,0,.42)}
html{scroll-behavior:smooth} body{margin:0;min-height:100vh;font-family:"Noto Sans JP",system-ui,sans-serif;background:radial-gradient(circle at 15% -8%,rgba(200,255,56,.18),transparent 28%),radial-gradient(circle at 92% 2%,rgba(255,79,184,.15),transparent 30%),linear-gradient(180deg,#090a0f 0%,#10131b 55%,#090a0f 100%);color:var(--text)}
button,textarea{font:inherit} button{border:0;cursor:pointer}.app{width:min(100%,460px);min-height:100vh;margin:0 auto;padding:14px 14px 110px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:8px 2px 14px}.brand{display:flex;align-items:center;gap:10px}.brand-mark{width:54px;height:44px;display:grid;place-items:center;filter:drop-shadow(0 3px 7px rgba(0,0,0,.45))}.brand-mark svg{width:54px;height:38px}.brand-copy strong{display:block;font-size:20px;line-height:1;letter-spacing:.05em}.brand-copy span{display:block;margin-top:4px;color:var(--muted);font-size:11px;font-weight:700}.round-icon{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;color:var(--text);background:rgba(255,255,255,.06);box-shadow:inset 0 0 0 1px var(--line)}.round-icon svg{width:21px;height:21px}
.composer-shell{position:fixed;inset:0;z-index:25;display:none;place-items:center;padding:18px;background:rgba(3,4,8,.78);backdrop-filter:blur(12px)}.composer-shell.open{display:grid}.composer{width:min(100%,620px);max-height:calc(100dvh - 36px);overflow-y:auto;border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025)),var(--panel);border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow)}body.composer-open{overflow:hidden}.pull-zone{display:grid;gap:12px;padding:16px}.greeting{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}.greeting h1{margin:0;font-size:28px;line-height:1.08;font-weight:900}.greeting p{margin:6px 0 0;color:var(--muted);font-size:12px;font-weight:700}.composer-head-actions{display:flex;align-items:center;gap:8px}.status-chip{flex:0 0 auto;border-radius:999px;padding:8px 10px;color:#090a0f;background:var(--acid);font-size:11px;font-weight:900}.composer-close{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;background:var(--panel3);color:var(--text);font-size:25px;line-height:1}.quick-input{width:100%;min-height:120px;resize:vertical;border:0;outline:0;border-radius:18px;background:#08090d;color:var(--text);padding:15px;line-height:1.65;box-shadow:inset 0 0 0 1px var(--line)}.quick-input:focus{box-shadow:inset 0 0 0 2px rgba(200,255,56,.7),0 0 0 4px rgba(200,255,56,.08)}.quick-input::placeholder{color:#687082}
.mode-picker{position:relative}.mode-controls{display:grid;grid-template-columns:1fr 50px;gap:8px}.mode-current{width:100%;min-height:50px;border-radius:16px;background:var(--panel2);color:var(--text);box-shadow:inset 0 0 0 1px var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 10px 0 14px}.random-mode-btn{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(255,79,184,.2),rgba(81,216,255,.18));color:var(--text);box-shadow:inset 0 0 0 1px var(--line)}.random-mode-btn svg{width:22px;height:22px}.random-mode-btn:active{transform:scale(.96)}.mode-current-text{display:grid;gap:2px;text-align:left}.mode-current-text small{color:var(--muted);font-size:10px;font-weight:900}.mode-current-text strong{font-size:14px}.mode-arrow{width:34px;height:34px;border-radius:12px;background:#090a0f;display:grid;place-items:center;color:var(--acid);flex:0 0 auto}.mode-arrow svg{width:18px;height:18px;transition:transform .2s ease}.mode-picker.open .mode-arrow svg{transform:rotate(180deg)}.mode-list{display:none;max-height:min(430px,52dvh);overflow-y:auto;margin-top:8px;border-radius:16px;background:#090a0f;border:1px solid var(--line);box-shadow:0 18px 40px rgba(0,0,0,.34)}.mode-picker.open .mode-list{display:grid}.mode-option{min-height:58px;display:grid;gap:3px;padding:10px 14px;background:#090a0f;color:var(--text);text-align:left;border-bottom:1px solid var(--line)}.mode-option:last-child{border-bottom:0}.mode-option strong{font-size:13px}.mode-option span{color:var(--muted);font-size:11px}.mode-option.active{background:linear-gradient(90deg,rgba(200,255,56,.16),rgba(81,216,255,.08));color:var(--acid)}
.composer-actions{display:grid}.convert-btn,.post-btn{min-height:50px;border-radius:16px;background:linear-gradient(135deg,var(--acid),var(--cyan));color:#090a0f;font-weight:900;box-shadow:0 12px 28px rgba(200,255,56,.14)}.drawer{max-height:0;overflow:hidden;transition:max-height .28s ease}.composer.has-result .drawer{max-height:560px}.drawer-inner{display:grid;gap:12px;padding:0 16px 16px}.result-box{min-height:128px;border-radius:18px;background:#090a0f;border:1px solid var(--line);padding:14px}.result-label{display:flex;align-items:center;gap:8px;margin-bottom:8px;color:var(--acid);font-size:12px;font-weight:900}.result-text{margin:0;color:var(--text);line-height:1.72;font-size:14px;white-space:pre-wrap}
.view{display:none}.view.active{display:block}.section-title{display:flex;align-items:end;justify-content:space-between;margin:18px 2px 10px}.section-title h2{margin:0;font-size:18px;font-weight:900}.section-title button{background:transparent;color:var(--acid);font-weight:900}.feed{display:grid;gap:10px}.post{border-radius:20px;background:rgba(18,20,28,.92);border:1px solid rgba(255,255,255,.08);box-shadow:0 14px 34px rgba(0,0,0,.22);padding:14px}.post-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.profile{display:flex;align-items:center;gap:9px}.avatar{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--pink),var(--orange));color:#090a0f;font-weight:900}.profile strong{display:block;font-size:13px}.profile span{display:block;margin-top:2px;color:var(--muted);font-size:11px}.tag{border-radius:999px;padding:6px 10px;background:rgba(200,255,56,.1);color:var(--acid);border:1px solid rgba(200,255,56,.25);font-size:10px;font-weight:900;white-space:nowrap}.post p{margin:0;color:#e8ecf4;line-height:1.72;font-size:14px}.source-accordion{margin-top:10px;border-radius:12px;overflow:hidden;background:rgba(255,255,255,.04)}.source-toggle{width:100%;min-height:42px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:transparent;color:var(--muted);font-size:12px;font-weight:900;text-align:left}.source-toggle svg{width:16px;height:16px;flex:0 0 auto;transition:transform .2s ease}.source-accordion.open .source-toggle{color:var(--acid)}.source-accordion.open .source-toggle svg{transform:rotate(180deg)}.source-note{display:none;margin:0;padding:0 12px 11px;color:var(--muted);font-size:12px;line-height:1.5}.source-accordion.open .source-note{display:block}.post-actions{display:flex;gap:8px;margin-top:12px}.action{min-width:62px;height:36px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;gap:5px;background:var(--panel3);color:var(--muted);font-size:12px;font-weight:900}.action svg{width:16px;height:16px}.action.like,.action.cheer,.action.comment{color:#f5f7fb}
.board-area{min-height:62vh}.board-index{display:block}.board-page{display:none}.board-area.detail-open .board-index{display:none}.board-area.detail-open .board-page{display:block}.board-back{margin:18px 0 10px;border-radius:14px;padding:10px 13px;background:var(--panel2);color:var(--text);font-weight:900;box-shadow:inset 0 0 0 1px var(--line)}.board-title-block{display:grid;gap:4px}.board-title-block p{margin:0;color:var(--muted);font-size:12px;font-weight:700}.board-create-btn{min-width:44px;height:44px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,var(--acid),var(--cyan));color:#090a0f;font-size:28px;font-weight:900;box-shadow:0 12px 28px rgba(200,255,56,.14)}.board-list{display:grid;gap:10px}.board-card{width:100%;display:grid;gap:9px;border-radius:18px;padding:14px;background:rgba(18,20,28,.92);border:1px solid rgba(255,255,255,.08);color:var(--text);text-align:left;box-shadow:0 14px 34px rgba(0,0,0,.22)}.board-card.active{border-color:rgba(200,255,56,.45);box-shadow:0 0 0 3px rgba(200,255,56,.08),0 14px 34px rgba(0,0,0,.22)}.board-card h3{margin:0;font-size:15px}.board-card p{margin:0;color:#dfe5ef;line-height:1.6;font-size:12px}.board-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--muted);font-size:11px;font-weight:800}.board-owner{display:flex;align-items:center;gap:8px}.board-owner .avatar{width:30px;height:30px;border-radius:10px}.board-detail{border-radius:20px;padding:14px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025)),var(--panel);border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow)}.board-detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}.board-detail h3{margin:0;font-size:18px}.board-detail p{margin:4px 0 0;color:var(--muted);line-height:1.6;font-size:12px}.board-messages{display:grid;gap:10px;margin:12px 0}.board-message{border-radius:14px;padding:11px;background:#090a0f;border:1px solid var(--line)}.board-message p{margin:7px 0 0;color:#e8ecf4;font-size:13px}.board-reply{display:grid;gap:8px}.board-reply textarea,.board-field textarea,.board-field input,.board-field select{width:100%;border:1px solid var(--line);outline:0;border-radius:14px;padding:12px;background:#090a0f;color:var(--text);font:inherit}.board-reply textarea{min-height:82px;resize:vertical}.board-reply button,.board-save{height:46px;border-radius:14px;background:linear-gradient(135deg,var(--acid),var(--cyan));color:#090a0f;font-weight:900}.empty-board{border:1px dashed var(--line);border-radius:18px;padding:18px;color:var(--muted);line-height:1.7;text-align:center}.board-field{display:grid;gap:7px;margin-top:14px}.board-field span{color:var(--muted);font-size:11px;font-weight:900}
.board-card{position:relative;display:block;padding:0;overflow:hidden}.board-card-main{width:100%;display:grid;gap:9px;padding:14px 54px 14px 14px;background:transparent;color:inherit;text-align:left}.board-flag{position:absolute;right:12px;bottom:12px;width:34px;height:34px;border-radius:12px;display:grid;place-items:center;background:rgba(255,255,255,.05);color:var(--muted);box-shadow:inset 0 0 0 1px var(--line)}.board-flag svg{width:18px;height:18px}.board-card.marked{border-color:rgba(200,255,56,.48);box-shadow:0 0 0 3px rgba(200,255,56,.08),0 14px 34px rgba(0,0,0,.22)}.board-card.marked .board-flag{background:rgba(200,255,56,.14);color:var(--acid);box-shadow:inset 0 0 0 1px rgba(200,255,56,.36),0 8px 20px rgba(200,255,56,.08)}.bottom-nav{position:fixed;left:50%;bottom:14px;z-index:12;transform:translateX(-50%);width:min(calc(100% - 28px),432px);min-height:70px;display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:8px;border-radius:22px;background:rgba(18,20,28,.9);border:1px solid rgba(255,255,255,.1);box-shadow:0 18px 46px rgba(0,0,0,.42);backdrop-filter:blur(16px)}.nav-btn{border-radius:16px;background:transparent;color:var(--muted);display:grid;place-items:center;gap:3px;padding:7px 2px;font-size:10px;font-weight:900}.nav-btn svg{width:21px;height:21px}.nav-btn.active{background:rgba(179,18,45,.18);color:#f5f7fb}.post-create-btn{position:relative;align-self:center;justify-self:center;width:64px;height:58px;margin-top:-28px;border-radius:20px;display:block;background:linear-gradient(145deg,#123c2d,#0a1712);border:1px solid rgba(179,18,45,.8);box-shadow:0 10px 30px rgba(179,18,45,.28),0 0 0 5px #10121a;transition:transform .18s ease}.post-create-btn:active{transform:scale(.92)}.post-create-btn svg{position:absolute;left:50%;top:50%;width:56px;height:36px;transform:translate(-50%,-50%);filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}.toast{position:fixed;left:50%;bottom:100px;z-index:40;transform:translateX(-50%) translateY(14px);width:min(calc(100% - 38px),380px);border-radius:14px;padding:12px 14px;background:#f5f7fb;color:#090a0f;font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.avatar img{width:100%;height:100%;object-fit:contain}.profile-modal{position:fixed;inset:0;z-index:30;display:none;place-items:center;padding:18px;background:rgba(3,4,8,.76);backdrop-filter:blur(12px)}.profile-modal.open{display:grid}.profile-panel{width:min(100%,460px);max-height:calc(100dvh - 36px);overflow:auto;border-radius:24px;padding:20px;background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow)}.profile-panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.profile-panel h2{margin:0;font-size:21px}.profile-close{width:38px;height:38px;border-radius:12px;background:var(--panel3);color:var(--text);font-size:22px}.profile-note{margin:7px 0 18px;color:var(--muted);font-size:12px;line-height:1.6}.profile-label{display:block;margin-bottom:7px;color:var(--muted);font-size:11px;font-weight:900}.profile-name-input{width:100%;height:48px;border:1px solid var(--line);outline:0;border-radius:14px;padding:0 14px;background:#090a0f;color:var(--text);font:inherit}.avatar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}.avatar-option{aspect-ratio:1;border-radius:18px;padding:8px;background:var(--panel2);border:2px solid transparent}.avatar-option img{width:100%;height:100%;object-fit:contain}.avatar-option.selected{border-color:var(--acid);background:rgba(200,255,56,.1);box-shadow:0 0 0 3px rgba(200,255,56,.08)}.profile-save{width:100%;height:50px;margin-top:18px;border-radius:16px;background:linear-gradient(135deg,var(--acid),var(--cyan));color:#090a0f;font-weight:900}
@media (min-width:860px){.app{width:min(100%,1100px);display:grid;grid-template-columns:420px 1fr;gap:28px;align-items:start;padding:26px 28px 108px}.topbar{grid-column:1}.feed-area,.board-area{grid-column:2;grid-row:1/span 3;padding-top:4px}.bottom-nav{width:min(calc(100% - 56px),740px)}}
</style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div class="brand"><div class="brand-mark" aria-hidden="true"><svg viewBox="0 0 512 260" fill="none"><path fill="#f2efe8" stroke="#08090d" stroke-width="8" d="M256 108C190 60 103 64 18 22c12 88 57 161 150 186 35-6 65-25 88-54Z"/><path fill="#08090d" stroke="#f2efe8" stroke-width="8" d="M256 108c66-48 153-44 238-86-12 88-57 161-150 186-35-6-65-25-88-54Z"/><path fill="#08090d" d="M70 101c51-29 99-23 141 15-34 42-77 51-128 27Z"/><path fill="#f2efe8" d="M301 116c42-38 90-44 141-15l-13 42c-51 24-94 15-128-27Z"/><path fill="#08090d" d="m53 56 67 29-42 8Zm62 94c29 7 55 3 78-13-11 29-34 47-68 53Z"/><path fill="#f2efe8" d="m459 56-67 29 42 8Zm-62 94c-29 7-55 3-78-13 11 29 34 47 68 53Z"/><path fill="#123c2d" d="m245 108 11-22 11 22-11 49Z"/></svg></div><div class="brand-copy"><strong>CAASOL</strong><span>嫌な出来事をネタに変える掲示板</span></div></div>
    <button class="round-icon" type="button" aria-label="通知"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
  </header>
  <section class="composer-shell" id="composerShell" role="dialog" aria-modal="true" aria-labelledby="composerTitle"><div class="composer" id="composer"><div class="pull-zone"><div class="greeting"><div><h1 id="composerTitle">今日の事件</h1><p>汚い言葉でもOK。AIが笑える書き込みに変えます。</p></div><div class="composer-head-actions"><span class="status-chip">LIVE</span><button class="composer-close" id="composerClose" type="button" aria-label="投稿画面を閉じる">×</button></div></div><textarea class="quick-input" id="inputText" placeholder="どんな言葉でもいい、思いの丈を綴ってください"></textarea><div class="mode-picker" id="modePicker"><div class="mode-controls"><button class="mode-current" id="modeCurrent" type="button" aria-expanded="false" aria-controls="modeList"><span class="mode-current-text"><small>変換モード</small><strong id="modeCurrentLabel">お嬢様口調</strong></span><span class="mode-arrow" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span></button><button class="random-mode-btn" id="randomModeBtn" type="button" aria-label="変換モードをランダムに選ぶ" title="おまかせ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg></button></div><div class="mode-list" id="modeList" aria-label="変換モード一覧"><button class="mode-option active" type="button" data-mode="lady"><strong>お嬢様口調</strong><span>理不尽を優雅な一撃に変換</span></button><button class="mode-option" type="button" data-mode="poetic"><strong>詩的モード</strong><span>嫌な出来事を余韻のある言葉に変換</span></button><button class="mode-option" type="button" data-mode="comedy"><strong>コメディモード</strong><span>身の回りの不満を笑える話に変換</span></button><button class="mode-option" type="button" data-mode="chuunibyou"><strong>中二病モード</strong><span>日常を封印と宿命の物語に変換</span></button><button class="mode-option" type="button" data-mode="business"><strong>ビジネスメールモード</strong><span>怒りを丁寧すぎる業務連絡に変換</span></button><button class="mode-option" type="button" data-mode="samurai"><strong>侍モード</strong><span>理不尽を武士の一幕として語る</span></button><button class="mode-option" type="button" data-mode="news"><strong>ニュースキャスターモード</strong><span>小さな事件を冷静な速報に変換</span></button><button class="mode-option" type="button" data-mode="philosopher"><strong>哲学者モード</strong><span>出来事を無駄に深い問いへ変換</span></button><button class="mode-option" type="button" data-mode="demonlord"><strong>魔王モード</strong><span>不満を世界征服級の宣言に変換</span></button><button class="mode-option" type="button" data-mode="classical"><strong>古文モード</strong><span>現代の愚痴をいとをかしに変換</span></button></div></div><div class="composer-actions"><button class="convert-btn" id="convertBtn" type="button">変換</button></div></div><div class="drawer"><div class="drawer-inner"><div class="result-box"><div class="result-label"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h8l-1 8 11-13h-8l1-7Z"/></svg>変換結果</div><p class="result-text" id="resultText">本音を書くと、ここに掲示板用の変換テキストが出ます。</p></div><button class="post-btn" id="postBtn" type="button">タイムラインに投げる</button></div></div></div></section>
  <section class="feed-area view active" id="feedArea" aria-label="タイムライン"><div class="section-title"><h2>タイムライン</h2><button type="button" id="latestBtn">新着</button></div><div class="feed" id="feed"></div></section>
  <section class="board-area view" id="boardArea" aria-label="掲示板"><div class="board-index" id="boardIndex"><div class="section-title"><div class="board-title-block"><h2>掲示板</h2><p>話題ごとに小部屋を作って、そこへ書き込めます。</p></div><button class="board-create-btn" id="boardCreateBtn" type="button" aria-label="掲示板を作る">+</button></div><div class="board-list" id="boardList"></div></div><div class="board-page" id="boardPage"><button class="board-back" id="boardBackBtn" type="button">← 掲示板一覧へ</button><article class="board-detail" id="boardDetail"></article></div></section>
</main>

const composerShell=document.getElementById('composerShell'),composer=document.getElementById('composer'),composerClose=document.getElementById('composerClose'),modePicker=document.getElementById('modePicker'),modeCurrent=document.getElementById('modeCurrent'),modeCurrentLabel=document.getElementById('modeCurrentLabel'),randomModeBtn=document.getElementById('randomModeBtn'),inputText=document.getElementById('inputText'),resultText=document.getElementById('resultText'),convertBtn=document.getElementById('convertBtn'),postBtn=document.getElementById('postBtn'),postCreateBtn=document.getElementById('postCreateBtn'),latestBtn=document.getElementById('latestBtn'),feedArea=document.getElementById('feedArea'),boardArea=document.getElementById('boardArea'),feed=document.getElementById('feed'),boardList=document.getElementById('boardList'),boardDetail=document.getElementById('boardDetail'),boardBackBtn=document.getElementById('boardBackBtn'),boardCreateBtn=document.getElementById('boardCreateBtn'),boardModal=document.getElementById('boardModal'),boardClose=document.getElementById('boardClose'),boardTitleInput=document.getElementById('boardTitleInput'),boardNoteInput=document.getElementById('boardNoteInput'),boardModeInput=document.getElementById('boardModeInput'),boardSave=document.getElementById('boardSave'),toast=document.getElementById('toast'),settingsBtn=document.getElementById('settingsBtn'),profileModal=document.getElementById('profileModal'),profileClose=document.getElementById('profileClose'),profileName=document.getElementById('profileName'),profileSave=document.getElementById('profileSave');let mode='lady',converted='';
inputText.placeholder='どんな言葉でもいい、思いの丈を綴ってください';
const modePrompts={lady:'次の愚痴や身の回りの出来事を、お嬢様口調の日本語に言いかえてください。汚い言葉や攻撃的な表現は、笑えるけれど人を直接傷つけない表現に変換してください。SNS掲示板の書き込みとして自然で、少し皮肉が効いた文章にしてください。返答は言いかえ後の文章だけにしてください。',poetic:'次の愚痴や身の回りの出来事を、詩的モードの日本語に言いかえてください。嫌な出来事を余韻のある短い文章にしつつ、読んだ人が少し笑える比喩を入れてください。人を直接傷つける表現は避けてください。返答は言いかえ後の文章だけにしてください。',comedy:'次の愚痴や身の回りの出来事を、コメディモードの日本語に言いかえてください。怒りや不満を、読んだ人が笑える掲示板の書き込みに変換してください。人を直接傷つける表現は避け、テンポよく短めにしてください。返答は言いかえ後の文章だけにしてください。',chuunibyou:'次の出来事を中二病モードの日本語に言いかえてください。日常の不満を、封印された力、宿命、闇、覚醒などを用いた大げさで格好つけた物語にしてください。読んだ人が笑える短い掲示板投稿にし、人を直接傷つける表現は避けてください。返答は変換後の文章だけにしてください。',business:'次の不満をビジネスメールモードの日本語に言いかえてください。怒りを極端に丁寧で冷静な業務連絡に変換し、「お世話になっております」などの表現を自然に使ってください。皮肉は含めても、人を直接攻撃しない短い文章にしてください。返答は変換後の文章だけにしてください。',samurai:'次の出来事を侍モードの日本語に言いかえてください。現代の理不尽を武士の戦いや不覚として語り、「拙者」「ござる」などを自然に使ってください。大げさで笑える短い掲示板投稿にし、人を直接傷つけないでください。返答は変換後の文章だけにしてください。',news:'次の出来事をニュースキャスターモードの日本語に言いかえてください。小さな日常の事件を、冷静で真面目なニュース速報や現場中継のように大げさに報道してください。簡潔で笑える文章にし、返答は変換後の文章だけにしてください。',philosopher:'次の出来事を哲学者モードの日本語に言いかえてください。日常の不満から、存在、自由、幸福、時間などについて無駄に深い問いを導いてください。難しそうなのに少し笑える短い文章にし、返答は変換後の文章だけにしてください。',demonlord:'次の出来事を魔王モードの日本語に言いかえてください。小さな不満を、世界征服を企む魔王の尊大な宣言や勇者への挑戦のように表現してください。大げさで笑える短い文章にし、人を直接傷つけないでください。返答は変換後の文章だけにしてください。',classical:'次の出来事を古文モードの日本語に言いかえてください。現代の愚痴を古文調にし、「いと」「けり」「なり」「をかし」などを読みやすく自然に使ってください。意味が伝わり、少し笑える短い文章にしてください。返答は変換後の文章だけにしてください。'};
const modeLabels={lady:'お嬢様口調',poetic:'詩的モード',comedy:'コメディモード',chuunibyou:'中二病モード',business:'ビジネスメールモード',samurai:'侍モード',news:'ニュースキャスターモード',philosopher:'哲学者モード',demonlord:'魔王モード',classical:'古文モード'};
const rewritePolicy='最重要ルール：入力文全体を作り替えないでください。変換してよいのは、暴言、罵倒、侮辱、攻撃的な言葉だけです。暴言ではない言葉、普通の説明、感想、名前、数字、語順、句読点は必ずそのまま残してください。暴言が含まれない場合は、入力文を一文字も変更せず、そのまま返してください。返答は変換後の本文だけにしてください。';
const offensiveWords=['死ね','しね','シネ','殺す','消えろ','黙れ','うざい','ウザい','キモい','きもい','バカ','馬鹿','アホ','クズ野郎','ゴミ野郎','カス野郎','デブ','ハゲ','ブス','無能','ふざけんな','クソ野郎','くそ野郎'];
function hasOffensiveLanguage(text){return offensiveWords.some(word=>text.includes(word))}
function systemPromptForMode(targetMode){const label=modeLabels[targetMode]||'お嬢様口調';return `あなたは掲示板投稿の一部だけを整える係です。\n\n${rewritePolicy}\n変換対象は暴言、罵倒、侮辱、攻撃的な言葉だけです。\n暴言ではない文章は、愚痴・出来事・雑談・感想であっても絶対に言い換えないでください。\n暴言を置き換える時だけ、${label}の雰囲気を薄く加えてください。\n暴言以外の部分には${label}の口調や比喩を足さないでください。`}
const storedPostsKey='caasol-posts',boardMarksKey='caasol-board-marks';
const profileKey='caasol-profile',avatarNames=['longnose','roundears','firebox','oneeye','boxhead','snail'];let profile=readProfile(),selectedAvatar=profile.avatar;
let boardMarks=readBoardMarks(),boards=[],activeBoardId=null,boardSyncTimer=null,boardSyncing=false;
function readStoredPosts(){try{const posts=JSON.parse(localStorage.getItem(storedPostsKey)||'[]');return Array.isArray(posts)?posts:[]}catch(error){return[]}}
function readProfile(){try{const saved=JSON.parse(localStorage.getItem(profileKey)||'{}');return{name:typeof saved.name==='string'&&saved.name.trim()?saved.name.trim().slice(0,20):'匿名',avatar:avatarNames.includes(saved.avatar)?saved.avatar:'longnose'}}catch(error){return{name:'匿名',avatar:'longnose'}}}
function avatarUrl(avatar){return`assets/avatars/${avatarNames.includes(avatar)?avatar:'longnose'}.png`}
function readBoardMarks(){try{const saved=JSON.parse(localStorage.getItem(boardMarksKey)||'[]');return new Set(Array.isArray(saved)?saved.filter(id=>typeof id==='string'):[])}catch(error){return new Set()}}
function saveBoardMarks(){localStorage.setItem(boardMarksKey,JSON.stringify([...boardMarks]))}
function normalizeBoardMessage(message){return{id:String(message.id||Date.now()),boardId:String(message.boardId||message.board_id||''),text:typeof message.text==='string'?message.text:'',source:typeof message.source==='string'?message.source:'非公開',mode:modeLabels[message.mode]?message.mode:'lady',username:typeof message.username==='string'&&message.username.trim()?message.username.trim():'匿名',avatar:avatarNames.includes(message.avatar)?message.avatar:'longnose',createdAt:message.createdAt||message.created_at||new Date().toISOString()}}
function normalizeBoard(board){const id=String(board.id||Date.now());return{id,title:typeof board.title==='string'?board.title:'無題の掲示板',note:typeof board.note==='string'?board.note:'',mode:modeLabels[board.mode]?board.mode:'lady',username:typeof board.username==='string'&&board.username.trim()?board.username.trim():'匿名',avatar:avatarNames.includes(board.avatar)?board.avatar:'longnose',createdAt:board.createdAt||board.created_at||new Date().toISOString(),marked:boardMarks.has(id),messages:Array.isArray(board.messages)?board.messages.map(normalizeBoardMessage):[]}}
function boardDate(value){const date=new Date(value);return Number.isNaN(date.getTime())?'たった今':date.toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}
function createBoardCard(board){const article=document.createElement('article');article.className='board-card';article.classList.toggle('active',board.id===activeBoardId);article.classList.toggle('marked',Boolean(board.marked));article.innerHTML=`<button class="board-card-main" type="button"><div class="board-meta"><span>${escapeHtml(boardDate(board.createdAt))}</span><span>${board.messages.length}件</span></div><h3>${escapeHtml(board.title)}</h3><p>${escapeHtml(board.note||'まだ説明はありません。')}</p><div class="board-owner"><div class="avatar"><img src="${avatarUrl(board.avatar)}" alt=""></div><span>${escapeHtml(board.username||'匿名')}</span><span class="tag">${escapeHtml(modeLabels[board.mode]||'お嬢様口調')}</span></div></button><button class="board-flag" type="button" aria-pressed="${Boolean(board.marked)}" aria-label="${board.marked?'目印を外す':'目印を付ける'}"><svg viewBox="0 0 24 24" fill="${board.marked?'currentColor':'none'}" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21V4"/><path d="M5 5h11l-1.4 4L16 13H5"/></svg></button>`;article.querySelector('.board-card-main').addEventListener('click',()=>openBoardPage(board.id));article.querySelector('.board-flag').addEventListener('click',()=>toggleBoardMark(board.id));return article}
function toggleBoardMark(boardId){if(boardMarks.has(boardId))boardMarks.delete(boardId);else boardMarks.add(boardId);saveBoardMarks();const board=boards.find(item=>item.id===boardId);if(board)board.marked=boardMarks.has(boardId);renderBoards();showToast(boardMarks.has(boardId)?'目印を付けました。':'目印を外しました。')}
function renderBoards(){if(!boards.length){boardList.innerHTML='<div class="empty-board">まだ掲示板がありません。右上の＋から最初の話題を作れます。</div>';boardDetail.innerHTML='';return}boardList.replaceChildren(...boards.map(createBoardCard));if(boardArea.classList.contains('detail-open'))renderBoardDetail()}
function openBoardPage(boardId){activeBoardId=boardId;boardArea.classList.add('detail-open');renderBoards();renderBoardDetail();window.scrollTo({top:0,behavior:'smooth'})}
function closeBoardPage(){boardArea.classList.remove('detail-open');activeBoardId=null;renderBoards();window.scrollTo({top:0,behavior:'smooth'})}
function renderBoardDetail(){const board=boards.find(item=>item.id===activeBoardId),replyInput=document.getElementById('boardReplyInput'),draft=replyInput?replyInput.value:'',wasFocused=document.activeElement===replyInput;if(!board){boardDetail.innerHTML='<div class="empty-board">掲示板を選んでください。</div>';return}const messages=board.messages.length?board.messages.map(message=>`<div class="board-message"><div class="board-owner"><div class="avatar"><img src="${avatarUrl(message.avatar)}" alt=""></div><span>${escapeHtml(message.username||'匿名')} ・ ${escapeHtml(boardDate(message.createdAt))}</span>${message.mode?`<span class="tag">${escapeHtml(modeLabels[message.mode]||message.mode)}</span>`:''}</div><p>${escapeHtml(message.text)}</p></div>`).join(''):'<div class="empty-board">まだ書き込みはありません。最初の一言を入れてみてください。</div>';boardDetail.innerHTML=`<div class="board-detail-head"><div><h3>${escapeHtml(board.title)}</h3><p>${escapeHtml(board.note||'自由に書き込める掲示板です。')}</p></div><span class="tag">${escapeHtml(modeLabels[board.mode]||'お嬢様口調')}</span></div><div class="board-messages">${messages}</div><div class="board-reply"><textarea id="boardReplyInput" maxlength="240" placeholder="暴言も${escapeHtml(modeLabels[board.mode]||'お嬢様口調')}に変換されます"></textarea><button id="boardReplyBtn" type="button">変換して掲示板に投稿</button></div>`;const nextReplyInput=document.getElementById('boardReplyInput');nextReplyInput.value=draft;if(wasFocused)nextReplyInput.focus({preventScroll:true});document.getElementById('boardReplyBtn').addEventListener('click',()=>addBoardMessage(board.id))}
async function rewriteForMode(text,targetMode){if(!hasOffensiveLanguage(text))return text;try{const response=await fetch('/api/convert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'system',content:systemPromptForMode(targetMode)},{role:'user',content:text}]})}),data=await response.json();if(!response.ok)throw new Error('変換できませんでした。');const rewritten=(data.choices||[]).map(choice=>choice.message&&choice.message.content||'').join('').trim();return rewritten||localRewrite(text,targetMode)}catch(error){return localRewrite(text,targetMode)}}
async function addBoardMessage(boardId){const input=document.getElementById('boardReplyInput'),button=document.getElementById('boardReplyBtn'),text=input.value.trim();if(!text){showToast('書き込み内容を入力してください。');input.focus();return}const board=boards.find(item=>item.id===boardId);if(!board)return;button.disabled=true;button.textContent='変換中';try{const rewritten=await rewriteForMode(text,board.mode),response=await fetch('/api/boards',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({boardId:board.id,text:rewritten.slice(0,500),source:text.slice(0,240),mode:board.mode,username:profile.name,avatar:profile.avatar})}),data=await readApiResponse(response,'掲示板APIがまだデプロイされていません。');if(!response.ok)throw new Error((data.error&&data.error.message)||'書き込みを保存できませんでした。');board.messages.unshift(normalizeBoardMessage(data.message));renderBoards();showToast(`${modeLabels[board.mode]||'指定モード'}で変換して投稿しました。`)}catch(error){showToast(error.message||'書き込みを保存できませんでした。')}finally{button.disabled=false;button.textContent='変換して掲示板に投稿'}}
function openBoardModal(){boardTitleInput.value='';boardNoteInput.value='';boardModeInput.value=mode;boardModal.classList.add('open');boardTitleInput.focus()}

async function createBoard(){const title=boardTitleInput.value.trim(),note=boardNoteInput.value.trim(),boardMode=modeLabels[boardModeInput.value]?boardModeInput.value:'lady';if(!title){showToast('掲示板のタイトルを入力してください。');boardTitleInput.focus();return}boardSave.disabled=true;boardSave.textContent='作成中';try{const response=await fetch('/api/boards',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:title.slice(0,40),note:note.slice(0,120),mode:boardMode,username:profile.name,avatar:profile.avatar})}),data=await readApiResponse(response,'掲示板APIがまだデプロイされていません。');if(!response.ok)throw new Error((data.error&&data.error.message)||'掲示板を作成できませんでした。');const board=normalizeBoard(data.board);boards.unshift(board);closeBoardModal();openBoardPage(board.id);showToast(`${modeLabels[boardMode]}の掲示板を作りました。`)}catch(error){showToast(error.message||'掲示板を作成できませんでした。')}finally{boardSave.disabled=false;boardSave.textContent='掲示板を作成'}}
function createPostArticle(post){const article=document.createElement('article'),postedAt=new Date(post.created_at||post.createdAt),username=(post.username||'匿名').trim(),avatar=avatarNames.includes(post.avatar)?post.avatar:'longnose';article.className='post';article.dataset.remotePost='true';article.innerHTML=`<div class="post-head"><div class="profile"><div class="avatar"><img src="${avatarUrl(avatar)}" alt=""></div><div><strong>${escapeHtml(username)}</strong><span>${Number.isNaN(postedAt.getTime())?'たった今':postedAt.toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span></div></div><span class="tag">${escapeHtml(modeLabels[post.mode]||post.modeLabel||'投稿')}</span></div><p>${escapeHtml(post.text)}</p><div class="source-accordion"><button class="source-toggle" type="button" aria-expanded="false"><span>元ネタを見る</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button><div class="source-note">元ネタ：${escapeHtml(post.source||'非公開')}</div></div><div class="post-actions"><button class="action like" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v12"/><path d="M15 5.9 14 10h5.8a2 2 0 0 1 2 2.2l-.9 7a2 2 0 0 1-2 1.8H7V10l4-8a3.1 3.1 0 0 1 4 3.9Z"/><path d="M3 10h4v12H3Z"/></svg> 0</button><button class="action cheer" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c4 0 7-3 7-7 0-3-2-5-4-7 0 2-1 3-2 4 0-4-2-7-5-10 0 4-3 6-3 10 0 5 3 10 7 10Z"/><path d="M9 18c0-2 1-3 3-5 0 2 2 3 2 5a2.5 2.5 0 0 1-5 0Z"/></svg> 0</button><button class="action comment" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4Z"/></svg> 0</button></div>`;const sourceAccordion=article.querySelector('.source-accordion'),sourceToggle=article.querySelector('.source-toggle');sourceToggle.addEventListener('click',()=>{const open=sourceAccordion.classList.toggle('open');sourceToggle.setAttribute('aria-expanded',String(open));sourceToggle.querySelector('span').textContent=open?'元ネタを閉じる':'元ネタを見る'});return article}
function clearRemotePosts(){feed.querySelectorAll('[data-remote-post="true"]').forEach(article=>article.remove())}
async function readApiResponse(response,fallbackMessage='投稿APIがまだデプロイされていません。'){const contentType=response.headers.get('content-type')||'';if(!contentType.includes('application/json'))throw new Error(fallbackMessage);return response.json()}
async function loadPosts(){try{const response=await fetch('/api/posts',{cache:'no-store'}),data=await readApiResponse(response);if(!response.ok)throw new Error((data.error&&data.error.message)||'投稿を取得できませんでした。');clearRemotePosts();(data.posts||[]).slice().reverse().forEach(post=>feed.prepend(createPostArticle(post)))}catch(error){showToast(error.message||'タイムラインを読み込めませんでした。')}}
async function loadBoards(options={}){if(boardSyncing)return;boardSyncing=true;try{if(!options.silent)boardList.innerHTML='<div class="empty-board">掲示板を読み込んでいます。</div>';const response=await fetch('/api/boards',{cache:'no-store'}),data=await readApiResponse(response,'掲示板APIがまだデプロイされていません。');if(!response.ok)throw new Error((data.error&&data.error.message)||'掲示板を取得できませんでした。');boards=(data.boards||[]).map(normalizeBoard);if(activeBoardId&&!boards.some(board=>board.id===activeBoardId)){activeBoardId=null;boardArea.classList.remove('detail-open')}renderBoards()}catch(error){renderBoards();if(!options.silent)showToast(error.message||'掲示板を読み込めませんでした。')}finally{boardSyncing=false}}
async function migrateStoredPosts(){const storedPosts=readStoredPosts();if(!storedPosts.length)return;for(const post of storedPosts.slice().reverse()){const response=await fetch('/api/posts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:post.text,source:post.source||'非公開',mode:post.mode,username:post.username||'匿名',avatar:post.avatar||'longnose'})});if(!response.ok)return}localStorage.removeItem(storedPostsKey)}
function showToast(message){toast.textContent=message;toast.classList.add('show');clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.classList.remove('show'),2200)}
function openProfile(){profileName.value=profile.name==='匿名'?'':profile.name;selectedAvatar=profile.avatar;document.querySelectorAll('.avatar-option').forEach(button=>button.classList.toggle('selected',button.dataset.avatar===selectedAvatar));profileModal.classList.add('open');profileName.focus()}
function closeProfile(){profileModal.classList.remove('open')}
function openComposer(){composerShell.classList.add('open');document.body.classList.add('composer-open');setTimeout(()=>inputText.focus({preventScroll:true}),80)}
function closeComposer(){composerShell.classList.remove('open');document.body.classList.remove('composer-open');modePicker.classList.remove('open');modeCurrent.setAttribute('aria-expanded','false')}
function startBoardSync(){stopBoardSync();boardSyncTimer=setInterval(()=>{if(!document.hidden&&boardArea.classList.contains('active'))loadBoards({silent:true})},3000)}
function stopBoardSync(){if(boardSyncTimer){clearInterval(boardSyncTimer);boardSyncTimer=null}}
function showMainView(view){feedArea.classList.toggle('active',view==='home');boardArea.classList.toggle('active',view==='board');if(view==='board'){closeBoardPage();loadBoards();startBoardSync()}else{boardArea.classList.remove('detail-open');stopBoardSync()}window.scrollTo({top:0,behavior:'smooth'})}
settingsBtn.addEventListener('click',()=>{closeComposer();closeBoardModal();openProfile()});boardCreateBtn.addEventListener('click',openBoardModal);boardBackBtn.addEventListener('click',closeBoardPage);boardClose.addEventListener('click',closeBoardModal);boardModal.addEventListener('click',event=>{if(event.target===boardModal)closeBoardModal()});boardSave.addEventListener('click',createBoard);profileClose.addEventListener('click',closeProfile);profileModal.addEventListener('click',event=>{if(event.target===profileModal)closeProfile()});composerClose.addEventListener('click',closeComposer);composerShell.addEventListener('click',event=>{if(event.target===composerShell)closeComposer()});document.addEventListener('keydown',event=>{if(event.key!=='Escape')return;if(boardModal.classList.contains('open'))closeBoardModal();else if(profileModal.classList.contains('open'))closeProfile();else if(composerShell.classList.contains('open'))closeComposer()});document.querySelectorAll('.avatar-option').forEach(button=>button.addEventListener('click',()=>{selectedAvatar=button.dataset.avatar;document.querySelectorAll('.avatar-option').forEach(item=>item.classList.toggle('selected',item===button))}));profileSave.addEventListener('click',()=>{const name=profileName.value.trim();if(!name){showToast('名前を入力してください。');profileName.focus();return}profile={name:name.slice(0,20),avatar:selectedAvatar};localStorage.setItem(profileKey,JSON.stringify(profile));showMainView('home');document.querySelectorAll('.nav-btn').forEach((button,index)=>button.classList.toggle('active',index===0));closeProfile();showToast('プロフィールを保存しました。')});
postCreateBtn.addEventListener('click',openComposer);
function selectMode(nextMode){mode=nextMode;modeCurrentLabel.textContent=modeLabels[mode];document.querySelectorAll('.mode-option').forEach(item=>item.classList.toggle('active',item.dataset.mode===mode));modePicker.classList.remove('open');modeCurrent.setAttribute('aria-expanded','false')}
modeCurrent.addEventListener('click',()=>{const isOpen=modePicker.classList.toggle('open');modeCurrent.setAttribute('aria-expanded',String(isOpen))});document.querySelectorAll('.mode-option').forEach(button=>button.addEventListener('click',()=>selectMode(button.dataset.mode)));randomModeBtn.addEventListener('click',()=>{const modes=Object.keys(modeLabels),randomMode=modes[Math.floor(Math.random()*modes.length)];selectMode(randomMode);showToast(`${modeLabels[randomMode]}を選びました。`)});document.addEventListener('click',event=>{if(!modePicker.contains(event.target)){modePicker.classList.remove('open');modeCurrent.setAttribute('aria-expanded','false')}});
convertBtn.addEventListener('click',async()=>{const text=inputText.value.trim();if(!text){showToast('まずは今日の事件を書いてください。');inputText.focus();return}composer.classList.add('has-result');if(!hasOffensiveLanguage(text)){converted=text;resultText.textContent=text;showToast('暴言がないので、そのまま投稿できます。');return}convertBtn.disabled=true;convertBtn.textContent='変換中';resultText.textContent='AIが変換しています...';try{const response=await fetch('/api/convert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'system',content:systemPromptForMode(mode)},{role:'user',content:text}]})});const data=await response.json();if(!response.ok)throw new Error((data.error&&data.error.message)||'変換できませんでした。');converted=(data.choices||[]).map(choice=>choice.message&&choice.message.content||'').join('').trim();resultText.textContent=converted||'変換結果が空でした。もう一度試してください。'}catch(error){converted=localRewrite(text,mode);resultText.textContent=converted;showToast('通信できないので、仮の変換を表示しました。')}finally{convertBtn.disabled=false;convertBtn.textContent='変換'}});
postBtn.addEventListener('click',async()=>{const text=(converted||resultText.textContent||'').trim(),source=inputText.value.trim();if(!text||text.includes('本音を書くと')){showToast('先に変換してください。');return}postBtn.disabled=true;postBtn.textContent='投稿中';try{const response=await fetch('/api/posts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,source:source||'非公開',mode,username:profile.name,avatar:profile.avatar})}),data=await readApiResponse(response);if(!response.ok)throw new Error((data.error&&data.error.message)||'投稿できませんでした。');feed.prepend(createPostArticle(data.post));inputText.value='';converted='';resultText.textContent='本音を書くと、ここに掲示板用の変換テキストが出ます。';composer.classList.remove('has-result');closeComposer();window.scrollTo({top:0,behavior:'smooth'});showToast('タイムラインに投げました。')}catch(error){showToast(error.message||'投稿できませんでした。')}finally{postBtn.disabled=false;postBtn.textContent='タイムラインに投げる'}});
latestBtn.addEventListener('click',async()=>{latestBtn.disabled=true;latestBtn.textContent='更新中';await loadPosts();latestBtn.disabled=false;latestBtn.textContent='新着'});
document.querySelectorAll('.nav-btn').forEach(button=>{button.addEventListener('click',()=>{closeComposer();closeBoardModal();const view=button.dataset.view;if(view)showMainView(view);document.querySelectorAll('.nav-btn').forEach(item=>item.classList.remove('active'));button.classList.add('active')})});
function localRewrite(text,targetMode=mode){if(!hasOffensiveLanguage(text))return text;const replacements={lady:'少々お上品でない表現',poetic:'心をざわつかせる影',comedy:'小事件',chuunibyou:'封印対象',business:'対応困難な表現',samurai:'不届きな振る舞い',news:'現場を混乱させる表現',philosopher:'問いを生む言葉',demonlord:'我が怒りの供物',classical:'いと困りける言の葉'},soft=replacements[targetMode]||replacements.lady;let output=text;offensiveWords.forEach(word=>{output=output.split(word).join(soft)});return output}
function escapeHtml(value){return value.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
(async()=>{renderBoards();await migrateStoredPosts();await Promise.all([loadPosts(),loadBoards()])})();
</script>
